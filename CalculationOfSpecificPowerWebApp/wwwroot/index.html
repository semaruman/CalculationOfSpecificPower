<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Расчёт удельной мощности</h1>
    <form id="powerForm" method="post">
        <p>Количество потребителей:</p>
        <input type="number" id="count" name="count" required>
        <br/>
        <p>Тип потребителя:</p>
        <select id="type" name="type" required>
            <option>природный газ</option>
            <option>сжиженный газ</option>
            <option>электрические плиты</option>
            <option>садовые домики</option>
        </select>
        <p>Cos φ</p>
        <input type="number" id="cosF" name="cosF" value="0.98" step="any">
        <br/>
        <button type="submit">Расчитать мощность</button>
    </form>

    <div>
        <div id="specificPower"></div>
        <div id="ratedPower"></div>
        <div id="tokPower"></div>
    </div>

    <script>
        // Эта функция сработает при отправке формы
        document.getElementById('powerForm').addEventListener('submit', async function(event) {
            event.preventDefault(); // Отменяем перезагрузку страницы
            
            //получение значений из полей формы
            const count = document.getElementById('count').value;
            const type = document.getElementById('type').value;
            const cosF = document.getElementById('cosF').value;
            
            //отправка api на контроллер
            const specPowerResponse = await fetch(`/api/Calculator/specific-power?count=${count}&type=${type}`);
            const ratedPowerResponse = await fetch(`/api/Calculator/rated-power?count=${count}&type=${type}`);
            const tokPowerResponse = await fetch(`/api/Calculator/electric-current?count=${count}&type=${type}&cosf=${cosF}`);
            //получение json
            const specPowerData = await specPowerResponse.json();
            const ratedPowerData = await ratedPowerResponse.json();
            const tokPowerData = await tokPowerResponse.json();
            
            //извлечение знчений
            const specificPower = specPowerData.specificPower;
            const ratedPower = ratedPowerData.fullSpecificPower;
            const tokPower = tokPowerData.electricCurrent;
            //отображение результата
            document.getElementById('specificPower').innerHTML = `Итого кВт на 1кв, Pуд.: ${specificPower}`;
            document.getElementById('ratedPower').innerHTML = `Итого кВт, Pр.: ${ratedPower}`;
            document.getElementById('tokPower').innerHTML = `Ток, Iр.: ${tokPower}`;
        });
    </script>
</body>
</html>
