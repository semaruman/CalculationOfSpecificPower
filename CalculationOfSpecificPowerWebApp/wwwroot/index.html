<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <title>Калькулятор удельной мощности</title>
    
</head>

<body>
    <div style="text-align: center;">
        <h1 class="d-inline-block">Расчёт удельной мощности</h1>
    </div>
    <div style="text-align: center;">
        <div class="card shadow mb-3 p-3 w-25 d-inline-block">
            <form id="powerForm" method="post" style="text-align: center;">
                <p class="mb-1">Количество потребителей:</p>
                <input type="number" id="count" name="count" class="card d-inline-block mb-3" required>
                <p class="mb-1">Тип потребителя:</p>
                <select id="type" name="type" class="card d-inline-block mb-3" required>
                    <option>природный газ</option>
                    <option>сжиженный газ</option>
                    <option>электрические плиты</option>
                    <option>садовые домики</option>
                </select>
                <p class="mb-1">Cos φ</p>
                <input type="number" id="cosF" name="cosF" value="0.98" step="0.01" class="card d-inline-block mb-3">
                <br />
                <button type="submit" class="btn btn-primary mb-4">Расчитать мощность</button>

                <p class="mb-1">Длина ЛЭП метров:</p>
                <input type="number" id="length" name="length" step="any" class="card d-inline-block mb-3">
                <br />
                <button onclick="calculateMoment()" class="btn btn-secondary">Расчитать момент</button>
            </form>
        </div>
    </div>
    <div class="card">
        <div id="specificPower"></div>
        <div id="ratedPower"></div>
        <div id="tokPower"></div>
        <div id="moment"></div>
    </div>

    <script>
        async function calculateMoment() {
            //получение значений из полей формы
            const count = document.getElementById('count').value;
            const type = document.getElementById('type').value;
            const length = document.getElementById('length').value;

            const momentResponse = await fetch(`/api/Calculator/moment?count=${count}&type=${type}&length=${length}`);

            const momentData = await momentResponse.json();

            const moment = momentData.moment;

            document.getElementById('moment').innerHTML = `Момент: ${moment}`;
        }

        // Эта функция сработает при отправке формы
        document.getElementById('powerForm').addEventListener('submit', async function (event) {
            event.preventDefault(); // Отменяем перезагрузку страницы

            //получение значений из полей формы
            const count = document.getElementById('count').value;
            const type = document.getElementById('type').value;
            const cosF = document.getElementById('cosF').value;

            //отправка api на контроллер
            const specPowerResponse = await fetch(`/api/Calculator/specific-power?count=${count}&type=${type}`);
            const ratedPowerResponse = await fetch(`/api/Calculator/rated-power?count=${count}&type=${type}`);
            const tokPowerResponse = await fetch(`/api/Calculator/electric-current?count=${count}&type=${type}&cosf=${cosF}`);
            //получение json
            const specPowerData = await specPowerResponse.json();
            const ratedPowerData = await ratedPowerResponse.json();
            const tokPowerData = await tokPowerResponse.json();

            //извлечение знчений
            const specificPower = specPowerData.specificPower;
            const ratedPower = ratedPowerData.fullSpecificPower;
            const tokPower = tokPowerData.electricCurrent;
            //отображение результата
            document.getElementById('specificPower').innerHTML = `Итого кВт на 1кв, Pуд.: ${specificPower}`;
            document.getElementById('ratedPower').innerHTML = `Итого кВт, Pр.: ${ratedPower}`;
            document.getElementById('tokPower').innerHTML = `Ток, Iр.: ${tokPower}`;
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
